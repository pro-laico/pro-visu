name: Publish package

# Publishes the package to npm when a release tag (created by `pnpm release`) is
# pushed: `git push --follow-tags`.
#
# Auth: npm **Trusted Publishing** (OIDC) — no long-lived NPM_TOKEN. The package
# must already exist on npm with a Trusted Publisher pointing at this repo + this
# workflow file (npmjs.com -> package -> Settings -> Trusted Publisher). A brand-new
# package CANNOT be published via OIDC: publish its first version locally
# (`npm login` + `pnpm publish-packages`), then add the trusted publisher.
# See tools/releaser/README.md.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm trusted publishing + provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Trusted Publishing: pnpm/npm exchanges the short-lived OIDC token
      # automatically at publish time (no secret). Provenance is attached because
      # id-token: write is set; the explicit flag keeps it unambiguous.
      - name: Publish to npm (trusted publishing + provenance)
        run: pnpm publish-packages --yes --provenance --tag latest
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      # --- Fallback: long-lived token. If OIDC is ever unavailable, add a granular
      # NPM_TOKEN repo secret, then UNCOMMENT this step and move it ABOVE the publish
      # step so auth is configured first.
      # - name: Configure npm auth
      #   run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc
